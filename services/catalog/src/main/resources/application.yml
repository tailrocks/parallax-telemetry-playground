spring:
  application:
    name: catalog
  datasource:
    url: ${CATALOG_DATABASE_URL:jdbc:postgresql://postgres:5432/playground}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:playground}
  sql:
    init:
      mode: always
  graphql:
    # A7: GraphQL-over-WebSocket transport for the priceChanges subscription.
    websocket:
      path: /graphql
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${PARALLAX_ENV:playground}
  release: ${RELEASE:0.1.0}
  traces-sample-rate: 1.0
  # A17: continuous profiling — JVM async-profiler (GA since Sentry SDK 8.23, we
  # run 8.46). profile-lifecycle=trace ties the profiler to sampled traces, so a
  # CPU-hot path (e.g. payment high-CPU chaos, B5) yields a trace-linked profile.
  profile-session-sample-rate: 1.0
  profile-lifecycle: trace
  send-default-pii: false
# OTel Java agent exemplar sampling is configured by
# OTEL_METRICS_EXEMPLAR_FILTER in compose.
logging:
  pattern:
    level: "trace_id=%mdc{trace_id} span_id=%mdc{span_id} %5p"
