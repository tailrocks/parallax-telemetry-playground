name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      lanes:
        description: velnor (default) | github | both
        type: choice
        default: velnor
        options: [velnor, github, both]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "false"
  SCCACHE_CACHE_SIZE: 20G

jobs:
  policy:
    name: Policy (${{ matrix.config.lane }})
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: "actionlint"
      - run: actionlint
      - run: scripts/check-scenarios.sh

  rust:
    name: Rust (${{ matrix.config.lane }})
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          persist-credentials: false
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0
          disable_annotations: "false"
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: "rust cargo:cargo-nextest aqua:protocolbuffers/protobuf/protoc"
      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-registry-${{ matrix.config.lane }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ matrix.config.lane }}-${{ runner.os }}-
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - run: cargo nextest run --locked --workspace --profile ci --no-tests=fail
      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-nextest-junit-${{ matrix.config.lane }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  java:
    name: Java ${{ matrix.service }} (${{ matrix.config.lane }})
    timeout-minutes: 30
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, payment, fulfillment]
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: "java aqua:protocolbuffers/protobuf/protoc"
      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ env.GRADLE_USER_HOME }}/caches
            ${{ env.GRADLE_USER_HOME }}/wrapper
          key: gradle-${{ matrix.config.lane }}-${{ runner.os }}-${{ hashFiles('services/**/gradle-wrapper.properties', 'services/**/build.gradle*', 'services/**/settings.gradle*') }}
          restore-keys: |
            gradle-${{ matrix.config.lane }}-${{ runner.os }}-
      - name: Run Java tests
        working-directory: services/${{ matrix.service }}
        run: ./gradlew --no-daemon test -Dorg.gradle.native=false
      - name: Upload Java test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: java-${{ matrix.service }}-tests-${{ matrix.config.lane }}
          path: services/${{ matrix.service }}/build/test-results/test
          if-no-files-found: error

  web:
    name: Web (${{ matrix.config.lane }})
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: "bun"
      - name: Cache Bun packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ matrix.config.lane }}-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            bun-${{ matrix.config.lane }}-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run build
      - run: ../scripts/check-typescript-policy.sh
      - name: Install Chromium dependencies
        run: bun ./node_modules/@playwright/test/cli.js install --with-deps chromium
      - run: bun ./node_modules/@playwright/test/cli.js test --project=chromium
      - name: Upload Playwright report and traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.config.lane }}
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: warn

  ci-required:
    name: CI required (${{ matrix.config.lane }})
    if: always()
    needs: [policy, rust, java, web]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - name: Require every lane
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          jq -e 'all(.[]; .result == "success")' <<< "$RESULTS"
