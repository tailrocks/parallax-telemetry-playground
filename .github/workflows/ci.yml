name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playground-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: "actionlint"
      - run: actionlint
      - run: scripts/check-scenarios.sh

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: "rust cargo:cargo-nextest"
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - run: cargo nextest run --locked --workspace --profile ci --no-tests=fail
      - run: cargo test --locked --workspace --doc
      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-nextest-junit
          path: target/nextest/ci/junit.xml
          if-no-files-found: warn

  java:
    runs-on: ubuntu-latest
    env:
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-user-home
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, payment, fulfillment]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: "java aqua:protocolbuffers/protobuf/protoc"
      - name: Run Java tests
        working-directory: services/${{ matrix.service }}
        run: ./gradlew --no-daemon test -Dorg.gradle.native=false
      - name: Upload Java test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: java-${{ matrix.service }}-tests
          path: services/${{ matrix.service }}/build/test-results/test
          if-no-files-found: error

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: "bun"
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run build
      - run: ../scripts/check-typescript-policy.sh
      - name: Install Chromium dependencies
        run: bun ./node_modules/@playwright/test/cli.js install --with-deps chromium
      - run: bun ./node_modules/@playwright/test/cli.js test --project=chromium
      - name: Upload Playwright report and traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            web/playwright-report
            web/test-results
          if-no-files-found: warn

  required:
    if: always()
    needs: [policy, rust, java, web]
    runs-on: ubuntu-latest
    steps:
      - name: Require every lane
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          jq -e 'all(.[]; .result == "success")' <<< "$RESULTS"
