# Telemetry Playground — all services. Emits OTLP to any host listener on
# 4317/4318: local `parallax serve` (UI on :4000) or the fan-out lab's Rotel.
#
# Here every service exports to OTEL_EXPORTER_OTLP_ENDPOINT, defaulting to a
# listener reached from a container via host.docker.internal:4317. Start
# Parallax or the lab first, then `docker compose up` here.
#
# Status: Rust services (checkout, pricing, inventory, recommendation,
# notifications, orders) + Java (catalog GraphQL, payment gRPC, fulfillment
# Kafka) + web (TanStack Start) all wired. Java uses the single Sentry+OTel
# javaagent (deploy/Dockerfile.java); web is the Nitro server (deploy/
# Dockerfile.web). Pin image tags at a real deploy.

name: telemetry-playground

x-otlp: &otlp
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  # Force OTLP export on the Java tier: the sentry-opentelemetry agent otherwise
  # routes spans to Sentry only and emits nothing over OTLP, so the fan-out
  # backends never see the Java services. (Ignored by the Rust services, which
  # build their exporters in code.)
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "otlp"
  OTEL_PROPAGATORS: "tracecontext,baggage"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=${PLAYGROUND_ENV:-playground}"
  PARALLAX_ENV: "${PLAYGROUND_ENV:-playground}"

services:
  checkout:
    build: { context: .., dockerfile: deploy/Dockerfile.rust, args: { BIN: checkout } }
    environment:
      <<: *otlp
      PRICING_ENDPOINT: "http://pricing:50051"
      CHECKOUT_ADDR: "0.0.0.0:8088"
      RELEASE: "${RELEASE:-v1}"
      GIT_SHA: "${GIT_SHA:-}"
      PLAYGROUND_SAMPLE_RATIO: "${PLAYGROUND_SAMPLE_RATIO:-}"
      FLAGD_HOST: "flagd"
      FLAGD_CACHE: "disabled"
    ports: ["8088:8088"]
    depends_on: [pricing, inventory, recommendation, flagd]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [pg]

  pricing:
    build: { context: .., dockerfile: deploy/Dockerfile.rust, args: { BIN: pricing } }
    environment: { <<: *otlp, PRICING_ADDR: "0.0.0.0:50051" }
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [pg]

  inventory:
    build: { context: .., dockerfile: deploy/Dockerfile.rust, args: { BIN: inventory } }
    environment: { <<: *otlp, ADDR: "0.0.0.0:8089" }
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [pg]

  recommendation:
    build: { context: .., dockerfile: deploy/Dockerfile.rust, args: { BIN: recommendation } }
    environment: { <<: *otlp, ADDR: "0.0.0.0:8090" }
    ports: ["8090:8090"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [pg]

  notifications:
    build: { context: .., dockerfile: deploy/Dockerfile.rust, args: { BIN: notifications } }
    environment: { <<: *otlp, ADDR: "0.0.0.0:8091" }
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [pg]

  orders:
    build: { context: .., dockerfile: deploy/Dockerfile.rust, args: { BIN: orders } }
    environment: { <<: *otlp, ADDR: "0.0.0.0:8092" }
    ports: ["8092:8092"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [pg]

  postgres:
    image: postgres:17
    environment: { POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-playground}", POSTGRES_DB: playground }
    networks: [pg]

  broker:
    image: redpandadata/redpanda:latest # Kafka-API-compatible, light
    # Advertise the compose service name so clients in other containers reach the
    # broker via broker:9092 (default advertises 127.0.0.1:9092 → unreachable
    # cross-container, breaking the producer/consumer round-trip).
    command: ["redpanda", "start", "--smp", "1", "--overprovisioned", "--node-id", "0", "--check=false",
              "--kafka-addr", "PLAINTEXT://0.0.0.0:9092",
              "--advertise-kafka-addr", "PLAINTEXT://broker:9092"]
    networks: [pg]

  flagd:
    image: ghcr.io/open-feature/flagd:latest
    command: ["start", "--uri", "file:/etc/flagd/flagd.json"]
    volumes: ["../flags/flagd.json:/etc/flagd/flagd.json:ro"]
    ports: ["8013:8013"]
    networks: [pg]

  # --- Java (single Sentry+OTel javaagent) ---
  catalog:
    build: { context: .., dockerfile: deploy/Dockerfile.java, args: { SERVICE: catalog } }
    environment:
      <<: *otlp
      # Java tier exports OTLP/HTTP (the agent's okhttp gRPC sender fails to read
      # Rotel's gRPC response; HTTP/protobuf to Rotel :4318 works).
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "catalog"
      OTEL_RESOURCE_ATTRIBUTES: "service.version=${RELEASE:-0.1.0},service.namespace=playground,deployment.environment.name=${PLAYGROUND_ENV:-playground}"
      OTEL_INSTRUMENTATION_MICROMETER_ENABLED: "true"
      OTEL_METRICS_EXEMPLAR_FILTER: "trace_based"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      FLAGD_HOST: "flagd"
      FLAGD_CACHE: "disabled"
      SERVER_PORT: "8080"
    ports: ["8080:8080"] # GraphQL (browser → catalog)
    depends_on: [flagd]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [pg]

  payment:
    build: { context: .., dockerfile: deploy/Dockerfile.java, args: { SERVICE: payment } }
    environment:
      <<: *otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "payment"
      OTEL_RESOURCE_ATTRIBUTES: "service.version=${RELEASE:-0.1.0},service.namespace=playground,deployment.environment.name=${PLAYGROUND_ENV:-playground}"
      OTEL_INSTRUMENTATION_MICROMETER_ENABLED: "true"
      OTEL_METRICS_EXEMPLAR_FILTER: "trace_based"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      SPRING_GRPC_SERVER_PORT: "9090"
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [pg]

  fulfillment:
    build: { context: .., dockerfile: deploy/Dockerfile.java, args: { SERVICE: fulfillment } }
    environment:
      <<: *otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "fulfillment"
      OTEL_RESOURCE_ATTRIBUTES: "service.version=${RELEASE:-0.1.0},service.namespace=playground,deployment.environment.name=${PLAYGROUND_ENV:-playground}"
      OTEL_INSTRUMENTATION_MICROMETER_ENABLED: "true"
      OTEL_METRICS_EXEMPLAR_FILTER: "trace_based"
      SENTRY_DSN: "${SENTRY_DSN:-}"
      KAFKA_BROKERS: "broker:9092"
      NOTIFICATIONS_URL: "http://notifications:8091"
    # POST /publish drives the cross-language async branch: Java produces to the
    # `orders` topic → consumes it → calls Rust `notifications` (reverse hop).
    ports: ["8093:8080"]
    depends_on: [broker, notifications]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [pg]

  # --- Frontend (TanStack Start, Nitro server) ---
  web:
    build: { context: .., dockerfile: deploy/Dockerfile.web }
    environment:
      # Server-side OTLP proxy target (browser → /v1/traces → Rotel HTTP).
      ROTEL_OTLP_HTTP_ENDPOINT: "http://host.docker.internal:4318"
      PORT: "3000"
    ports: ["5173:3000"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [pg]

  loadgen:
    image: grafana/k6:latest
    profiles: [demo]
    command: ["run", "/scripts/demo.js"]
    environment:
      CHECKOUT_URL: "http://checkout:8088"
      ORDERS_URL: "http://orders:8092"
      FULFILLMENT_URL: "http://fulfillment:8080"
    volumes: ["../loadgen:/scripts:ro"]
    depends_on: [checkout, orders, fulfillment]
    networks: [pg]

networks:
  pg:
    name: telemetry-playground
