syntax = "proto3";
package playground.pricing.v1;

// Pricing service — quoted by checkout over gRPC. A distinct service (not an A/B
// reimplementation); cross-service distributed tracing flows through it.
service Pricing {
  rpc Quote(QuoteRequest) returns (QuoteResponse);
}

message QuoteRequest {
  string sku = 1;
  uint32 quantity = 2;
}

message QuoteResponse {
  string sku = 1;
  uint32 quantity = 2;
  uint64 total_minor = 3; // total in minor units (cents)
  string currency = 4;
}
