syntax = "proto3";
package playground.pricing.v1;

option java_multiple_files = true;
option java_package = "dev.tailrocks.pricing.v1";

// Pricing service — quoted by checkout over gRPC. A distinct service (not an A/B
// reimplementation); cross-service distributed tracing flows through it.
service Pricing {
  rpc Quote(QuoteRequest) returns (QuoteResponse);
  // A7: server-streaming — emits a quote per unit (long-lived streaming span).
  rpc QuoteStream(QuoteRequest) returns (stream QuoteResponse);
}

message QuoteRequest {
  string sku = 1;
  uint32 quantity = 2;
  // Lab-only knobs used by deterministic gRPC semantics scenarios.
  uint32 delay_ms = 3;
  uint32 fail_at = 4;
}

message QuoteResponse {
  string sku = 1;
  uint32 quantity = 2;
  uint64 total_minor = 3; // total in minor units (cents)
  string currency = 4;
}
