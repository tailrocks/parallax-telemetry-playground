[tools]
rust = { version = "1.97.0", profile = "minimal", components = ["rustfmt", "clippy"] }
actionlint = "1.7.12"
"cargo:cargo-nextest" = "0.9.140"
# Bun is the sole JavaScript/TypeScript runtime and package manager.
bun = "1.3.14"
# Java tier (catalog/payment/fulfillment) builds on the latest GraalVM LTS.
# Gradle toolchains in each service request Java 25; mise provisions the JDK.
java = "oracle-graalvm-25.0.3"
"aqua:protocolbuffers/protobuf/protoc" = "35.1"
